# 复制本文件为实际实验配置，例如 experiment.local.yaml。

experiment:
  name: cloud-spec-exp-smoke
  seed: 0
  output_dir: results/cloud-spec-exp-smoke

model:
  provider: openai
  name: gpt-4.1
  temperature: 0

benchmark:
  cases_dir: benchmarks/cases
  case_ids:
    - example-bug-001

oracle:
  kind: runC
  command: "python oracles/run_oracle.py --case {case_id} --candidate {candidate_path}"
  success_condition: "candidate behavior matches reference implementation"

baselines:
  - name: mini-SWE-agent
    enabled: true
    repo_dir: baselines/mini-swe-agent
    command: "python run.py --config {config_path} --case {case_id}"
  - name: Agentless
    enabled: true
    repo_dir: baselines/Agentless
    command: "python repair.py --config {config_path} --case {case_id}"
  - name: AutoCodeRover
    enabled: false
    repo_dir: baselines/auto-code-rover
    command: "python app/main.py --config {config_path} --case {case_id}"

evaluation:
  timeout_seconds: 1800
  keep_failed_workdirs: true
  metrics:
    - resolved_by_oracle
    - regression_passed
    - wall_time_seconds
    - token_usage
    - patch_size
